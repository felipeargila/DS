<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cliente - Cotações</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Chakra Petch', sans-serif;
        }
        
        body {
            background: #283944;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        .card {
            background: white;
            border-radius: 4px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            color: #283944;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 600;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 16px;
            font-weight: 300;
        }
        
        .code-input-area {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .code-input {
            width: 200px;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s;
            letter-spacing: 4px;
            font-weight: 400;
            background: white;
            color: #283944;
            text-transform: uppercase;
        }
        
        .code-input:focus {
            border-color: #b7ab97;
            box-shadow: 0 0 0 3px rgba(183, 171, 151, 0.2);
        }
        
        .code-hint {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
            font-weight: 300;
        }
        
        .form-section {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        
        .form-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #283944;
            font-weight: 500;
            font-size: 14px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 300;
            background: white;
            color: #283944;
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: #b7ab97;
            outline: none;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        button {
            background: #b7ab97;
            color: #283944;
            border: none;
            padding: 15px 30px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            text-transform: uppercase;
            font-family: 'Chakra Petch', sans-serif;
        }
        
        button:hover {
            background: #a59984;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            font-weight: 300;
        }
        
        .success-message {
            background: #283944;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            text-align: center;
            display: none;
            font-weight: 300;
            border-left: 4px solid #b7ab97;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #283944;
            font-weight: 500;
            display: none;
        }
        
        .access-granted {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
            border-left: 4px solid #28a745;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- LOGO -->
            <div style="text-align: center; margin-bottom: 25px;">
                <img src="https://maqcare.dsindustria.com.br/wp-content/uploads/2026/03/LOGO.png" 
                     alt="Logo Maqcare" 
                     style="max-width: 200px; height: auto;">
            </div>

            <h1>PORTAL DE COTAÇÕES</h1>
            <p class="subtitle">Soluções em Usinagem de Precisão</p>
            
            <div class="code-input-area">
                <input type="text" class="code-input" id="accessCode" maxlength="10" placeholder="CÓDIGO">
                <p class="code-hint">Digite seu código de acesso</p>
                <div class="error-message" id="codeError"></div>
                <div class="loading" id="loadingCode">Validando...</div>
                <div class="access-granted" id="accessGranted">✓ ACESSO PERMITIDO</div>
            </div>
            
            <div class="form-section" id="formSection">
                <h2 style="margin-bottom: 20px; color: #283944;">SOLICITAR ORÇAMENTO</h2>
                
                <form id="quotationForm">
                    <div class="form-group">
                        <label>EMPRESA *</label>
                        <input type="text" id="empresa" required>
                    </div>
                    
                    <div class="form-group">
                        <label>CONTATO *</label>
                        <input type="text" id="contato" required>
                    </div>
                    
                    <div class="form-group">
                        <label>E-MAIL *</label>
                        <input type="email" id="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label>TELEFONE *</label>
                        <input type="tel" id="telefone" required>
                    </div>
                    
                    <div class="form-group">
                        <label>DESCRIÇÃO *</label>
                        <textarea id="descricao" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>MATERIAL</label>
                        <select id="material">
                            <option value="">Selecione...</option>
                            <option value="Aço Carbono">Aço Carbono</option>
                            <option value="Aço Inoxidável">Aço Inoxidável</option>
                            <option value="Alumínio">Alumínio</option>
                            <option value="Bronze">Bronze</option>
                            <option value="Ferro Fundido">Ferro Fundido</option>
                            <option value="Plástico">Plástico</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>QUANTIDADE</label>
                        <input type="number" id="quantidade" min="1">
                    </div>
                    
                    <div class="form-group">
                        <label>PRAZO DESEJADO</label>
                        <input type="text" id="prazo" placeholder="Ex: 15 dias">
                    </div>
                    
                    <div class="form-group">
                        <label>INFORMAÇÕES ADICIONAIS</label>
                        <textarea id="infoAdicional"></textarea>
                    </div>
                    
                    <button type="submit">ENVIAR SOLICITAÇÃO</button>
                </form>
                
                <div class="success-message" id="successMessage">
                    ORÇAMENTO ENVIADO COM SUCESSO!
                </div>
                
                <div class="loading" id="loadingSubmit">Enviando...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Elementos da página
        const accessCode = document.getElementById('accessCode');
        const codeError = document.getElementById('codeError');
        const loadingCode = document.getElementById('loadingCode');
        const accessGranted = document.getElementById('accessGranted');
        const formSection = document.getElementById('formSection');
        const quotationForm = document.getElementById('quotationForm');
        const successMessage = document.getElementById('successMessage');
        const loadingSubmit = document.getElementById('loadingSubmit');
        
        let vendedorAtual = null; // Guarda o vendedor após validação (interno)
        
        // Validação do código de acesso em tempo real
        accessCode.addEventListener('input', async function(e) {
            const code = e.target.value.trim().toUpperCase();
            
            // Esconde mensagens anteriores
            codeError.style.display = 'none';
            accessGranted.style.display = 'none';
            formSection.classList.remove('active');
            
            if (code.length >= 3) {
                loadingCode.style.display = 'block';
                accessCode.disabled = true;
                
                try {
                    const resposta = await fetch(`/api/vendedores/codigo/${code}`);
                    const dados = await resposta.json();
                    
                    if (dados.sucesso && dados.vendedor) {
                        // Código válido - guarda vendedor mas não mostra nome
                        vendedorAtual = dados.vendedor;
                        accessGranted.style.display = 'block';
                        formSection.classList.add('active');
                        accessCode.style.borderColor = '#b7ab97';
                    } else {
                        // Código inválido
                        codeError.style.display = 'block';
                        codeError.textContent = '❌ Código inválido';
                        accessCode.style.borderColor = '#dc3545';
                        vendedorAtual = null;
                    }
                } catch (erro) {
                    console.error('Erro ao validar código:', erro);
                    codeError.style.display = 'block';
                    codeError.textContent = '❌ Erro ao validar';
                    accessCode.style.borderColor = '#dc3545';
                } finally {
                    loadingCode.style.display = 'none';
                    accessCode.disabled = false;
                }
            } else {
                accessCode.style.borderColor = '#ddd';
                vendedorAtual = null;
            }
        });
        
        // Enviar formulário
        quotationForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!vendedorAtual) {
                alert('Código inválido. Digite novamente.');
                return;
            }
            
            loadingSubmit.style.display = 'block';
            
            const formData = {
                id: 'COT' + Date.now(),
                vendedorId: vendedorAtual.id,
                empresa: document.getElementById('empresa').value,
                contato: document.getElementById('contato').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                descricao: document.getElementById('descricao').value,
                material: document.getElementById('material').value,
                quantidade: document.getElementById('quantidade').value,
                prazo: document.getElementById('prazo').value,
                infoAdicional: document.getElementById('infoAdicional').value,
                arquivos: [],
                status: 'Novo Orçamento',
                dataCriacao: new Date().toISOString().split('T')[0],
                observacoes: ''
            };
            
            try {
                const resposta = await fetch('/api/cotacoes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const dados = await resposta.json();
                
                if (dados.sucesso) {
                    successMessage.style.display = 'block';
                    quotationForm.reset();
                    accessCode.value = '';
                    accessGranted.style.display = 'none';
                    formSection.classList.remove('active');
                    vendedorAtual = null;
                    
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 5000);
                } else {
                    alert('Erro ao enviar: ' + dados.erro);
                }
            } catch (erro) {
                console.error('Erro:', erro);
                alert('Erro de conexão com o servidor.');
            } finally {
                loadingSubmit.style.display = 'none';
            }
        });
        
        // Limpar código quando clicar no campo
        accessCode.addEventListener('focus', function() {
            if (this.value.length > 0) {
                this.value = '';
                accessGranted.style.display = 'none';
                formSection.classList.remove('active');
                vendedorAtual = null;
            }
        });
        
        // Converter para maiúsculas
        accessCode.addEventListener('keyup', function() {
            this.value = this.value.toUpperCase();
        });
    </script>
</body>
</html>
