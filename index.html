<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal do Cliente - Cotações</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Chakra Petch', sans-serif; }
    body { background:#283944; min-height:100vh; padding:20px; color:#283944; }
    .container { max-width:760px; margin:0 auto; }
    .card { background:#fff; border-radius:6px; box-shadow:0 20px 40px rgba(0,0,0,.25); padding:32px; }
    h1 { text-align:center; font-size:30px; margin-bottom:8px; }
    .subtitle { text-align:center; color:#68737b; margin-bottom:28px; }
    .hidden { display:none !important; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:14px; font-weight:600; margin-bottom:8px; color:#283944; }
    .field input, .field textarea, .field select { width:100%; padding:14px; border:1px solid #d8dee2; border-radius:4px; font-size:15px; }
    .field textarea { min-height:120px; resize:vertical; }
    .actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:12px; }
    button { border:0; border-radius:4px; padding:14px 18px; font-weight:700; cursor:pointer; }
    .btn-primary { background:#b9ad95; color:#283944; }
    .btn-dark { background:#283944; color:#fff; }
    .btn-light { background:#eef2f4; color:#283944; }
    .btn-danger { background:#db5757; color:#fff; }
    .code-area { max-width:360px; margin:0 auto 28px; }
    .code-status, .welcome-box, .contact-box, .success-box, .info-box { border-radius:4px; padding:16px; margin-bottom:18px; }
    .code-status { background:#eef2f4; color:#283944; }
    .welcome-box { background:#eef7ef; color:#255b32; border-left:4px solid #3ca55c; }
    .contact-box { background:#f8f7f4; border-left:4px solid #b9ad95; }
    .success-box { background:#eef7ef; color:#255b32; text-align:center; }
    .info-box { background:#f7f9fa; color:#51606b; }
    .file-list { margin-top:12px; display:flex; flex-direction:column; gap:8px; }
    .file-item { display:flex; justify-content:space-between; gap:10px; background:#f7f9fa; padding:10px 12px; border-radius:4px; }
    .link-btn { background:none; color:#2d67cc; padding:0; font-weight:700; }
    .logo { display:flex; justify-content:center; margin-bottom:18px; }
    .logo img { max-width:180px; }
    @media (max-width: 720px) {
      .row { grid-template-columns:1fr; }
      .card { padding:24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo"><img src="https://i.imgur.com/4FJQxPk.png" alt="DS MaqCare" onerror="this.style.display='none'"></div>
      <h1>Portal do Cliente</h1>
      <p class="subtitle">Envie sua cotação em poucos passos.</p>

      <div id="etapaCodigo" class="code-area">
        <div class="field">
          <label for="codigoAcesso">Código de acesso</label>
          <input id="codigoAcesso" maxlength="6" placeholder="Digite os 6 dígitos">
        </div>
        <button class="btn-primary" onclick="validarCodigo()">Continuar</button>
        <div id="codigoStatus" class="code-status hidden"></div>
      </div>

      <div id="etapaFormulario" class="hidden">
        <div class="field">
          <label for="cnpj">CNPJ</label>
          <input id="cnpj" placeholder="00.000.000/0000-00" onblur="buscarCliente()">
        </div>

        <div id="welcomeBox" class="welcome-box hidden"></div>
        <div id="contactBox" class="contact-box hidden"></div>

        <form id="cotacaoForm">
          <div class="row">
            <div class="field">
              <label for="empresa">Empresa *</label>
              <input id="empresa" required>
            </div>
            <div class="field">
              <label for="contato">Contato *</label>
              <input id="contato" required>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="email">Email *</label>
              <input id="email" type="email" required>
            </div>
            <div class="field">
              <label for="telefone">Telefone *</label>
              <input id="telefone" required>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="material">Material</label>
              <input id="material">
            </div>
            <div class="field">
              <label for="quantidade">Quantidade</label>
              <input id="quantidade">
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="prazo">Prazo desejado</label>
              <input id="prazo">
            </div>
            <div class="field">
              <label for="arquivoInput">Arquivos</label>
              <input id="arquivoInput" type="file" multiple>
            </div>
          </div>

          <div class="field">
            <label for="descricao">Descrição *</label>
            <textarea id="descricao" required></textarea>
          </div>

          <div class="field">
            <label for="infoAdicional">Informações adicionais</label>
            <textarea id="infoAdicional"></textarea>
          </div>

          <div id="fileList" class="file-list"></div>

          <div class="actions">
            <button type="submit" class="btn-dark">Enviar cotação</button>
          </div>
        </form>
      </div>

      <div id="successBox" class="success-box hidden">
        <h2 style="margin-bottom:10px;">Cotação enviada com sucesso</h2>
        <p style="margin-bottom:16px;">Recebemos sua solicitação. Você pode abrir uma nova cotação sem digitar tudo de novo.</p>
        <div class="actions" style="justify-content:center;">
          <button class="btn-primary" onclick="novaCotacao()">Nova Cotação</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '';
    const state = {
      vendedor: null,
      clienteExistente: false,
      arquivos: [],
      contatoOriginal: null,
      ultimaEmpresa: '',
      ultimoCnpj: ''
    };

    const $ = (id) => document.getElementById(id);

    function digits(v) { return (v || '').replace(/\D/g, ''); }
    function formatCnpj(v) {
      const n = digits(v).slice(0, 14);
      return n
        .replace(/^(\d{2})(\d)/, '$1.$2')
        .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
        .replace(/\.(\d{3})(\d)/, '.$1/$2')
        .replace(/(\/\d{4})(\d)/, '$1-$2');
    }
    function formatPhone(v) {
      const n = digits(v).slice(0, 11);
      if (n.length <= 10) return n.replace(/^(\d{2})(\d)/, '($1) $2').replace(/(\d{4})(\d)/, '$1-$2');
      return n.replace(/^(\d{2})(\d)/, '($1) $2').replace(/(\d{5})(\d)/, '$1-$2');
    }

    $('cnpj').addEventListener('input', e => e.target.value = formatCnpj(e.target.value));
    $('telefone').addEventListener('input', e => e.target.value = formatPhone(e.target.value));
    $('codigoAcesso').addEventListener('input', e => e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6));
    $('arquivoInput').addEventListener('change', uploadArquivos);
    $('cotacaoForm').addEventListener('submit', enviarCotacao);

    function mostrarCodigoStatus(texto, ok = false) {
      $('codigoStatus').classList.remove('hidden');
      $('codigoStatus').style.background = ok ? '#eef7ef' : '#fff3f3';
      $('codigoStatus').style.color = ok ? '#255b32' : '#a33737';
      $('codigoStatus').textContent = texto;
    }

    async function validarCodigo() {
      const codigo = $('codigoAcesso').value.trim();
      if (codigo.length !== 6) return mostrarCodigoStatus('Digite exatamente 6 caracteres.');
      try {
        const resp = await fetch(`${API_URL}/api/vendedores/codigo/${codigo}`);
        const dados = await resp.json();
        if (!dados.sucesso) return mostrarCodigoStatus('Código inválido.');
        state.vendedor = dados.vendedor;
        mostrarCodigoStatus(`Acesso liberado para ${dados.vendedor.nome}.`, true);
        $('etapaFormulario').classList.remove('hidden');
        $('cnpj').focus();
      } catch {
        mostrarCodigoStatus('Erro ao validar código.');
      }
    }

    async function buscarCliente() {
      const cnpj = digits($('cnpj').value);
      if (cnpj.length !== 14) return;
      state.ultimoCnpj = cnpj;
      try {
        const resp = await fetch(`${API_URL}/api/clientes/${cnpj}`);
        const dados = await resp.json();
        if (!dados.encontrado) {
          state.clienteExistente = false;
          state.contatoOriginal = null;
          $('welcomeBox').classList.add('hidden');
          $('contactBox').classList.add('hidden');
          if (!state.ultimaEmpresa) $('empresa').value = '';
          $('contato').value = '';
          $('email').value = '';
          $('telefone').value = '';
          return;
        }

        state.clienteExistente = true;
        state.contatoOriginal = { ...dados.cliente };
        $('empresa').value = dados.cliente.empresa || state.ultimaEmpresa || '';
        $('contato').value = dados.cliente.contato || '';
        $('email').value = dados.cliente.email || '';
        $('telefone').value = dados.cliente.telefone || '';

        $('welcomeBox').classList.remove('hidden');
        $('welcomeBox').innerHTML = `<strong>Bem-vindo, ${escapeHtml(dados.cliente.empresa || 'cliente')}.</strong><br>Encontramos seus dados e deixamos o contato pronto para agilizar sua próxima cotação.`;

        $('contactBox').classList.remove('hidden');
        $('contactBox').innerHTML = `
          <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;">
            <div>
              <strong>Contato identificado</strong><br>
              ${escapeHtml(dados.cliente.contato || '')}<br>
              ${escapeHtml(dados.cliente.email || '')}<br>
              ${escapeHtml(dados.cliente.telefone || '')}
            </div>
            <div class="actions" style="margin-top:0;">
              <button type="button" class="btn-light" onclick="editarContato()">Editar</button>
              <button type="button" class="btn-danger" onclick="naoSouEsseContato()">Não sou ${escapeHtml((dados.cliente.contato || '').split(' ')[0] || 'esse contato')}</button>
            </div>
          </div>`;
      } catch {
        $('welcomeBox').classList.add('hidden');
        $('contactBox').classList.add('hidden');
      }
    }

    function editarContato() {
      $('contato').focus();
    }

    function naoSouEsseContato() {
      $('contato').value = '';
      $('email').value = '';
      $('telefone').value = '';
      $('contato').focus();
    }

    async function uploadArquivos(event) {
      const files = Array.from(event.target.files || []);
      if (!files.length) return;
      const fd = new FormData();
      files.forEach(file => fd.append('arquivos', file));

      try {
        const resp = await fetch(`${API_URL}/api/upload`, { method: 'POST', body: fd });
        const dados = await resp.json();
        if (!dados.sucesso) throw new Error(dados.erro || 'Falha');
        state.arquivos.push(...dados.arquivos);
        renderFiles();
        event.target.value = '';
      } catch (erro) {
        alert(erro.message || 'Erro no upload');
      }
    }

    function renderFiles() {
      $('fileList').innerHTML = state.arquivos.map((file, idx) => `
        <div class="file-item">
          <span>${escapeHtml(file.originalname || file.filename || `Arquivo ${idx + 1}`)}</span>
          <button type="button" class="link-btn" onclick="removerArquivo(${idx})">Remover</button>
        </div>
      `).join('');
    }

    function removerArquivo(idx) {
      state.arquivos.splice(idx, 1);
      renderFiles();
    }

    async function enviarCotacao(event) {
      event.preventDefault();
      if (!state.vendedor) return alert('Valide o código de acesso primeiro.');

      const payload = {
        vendedorId: state.vendedor.id,
        cnpj: digits($('cnpj').value),
        empresa: $('empresa').value.trim(),
        contato: $('contato').value.trim(),
        email: $('email').value.trim(),
        telefone: $('telefone').value.trim(),
        descricao: $('descricao').value.trim(),
        material: $('material').value.trim(),
        quantidade: $('quantidade').value.trim(),
        prazo: $('prazo').value.trim(),
        infoAdicional: $('infoAdicional').value.trim(),
        status: 'Novo Orçamento',
        arquivos: state.arquivos
      };

      if (!payload.empresa || !payload.contato || !payload.email || !payload.telefone || !payload.descricao) {
        return alert('Preencha os campos obrigatórios.');
      }

      try {
        const resp = await fetch(`${API_URL}/api/cotacoes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const dados = await resp.json();
        if (!dados.sucesso) throw new Error(dados.erro || 'Falha ao enviar');
        state.ultimaEmpresa = payload.empresa;
        state.ultimoCnpj = payload.cnpj;
        $('etapaFormulario').classList.add('hidden');
        $('successBox').classList.remove('hidden');
      } catch (erro) {
        alert(erro.message || 'Erro ao enviar cotação');
      }
    }

    function novaCotacao() {
      const empresa = $('empresa').value || state.ultimaEmpresa || '';
      const cnpj = $('cnpj').value || formatCnpj(state.ultimoCnpj || '');
      const contatoOriginal = state.clienteExistente ? state.contatoOriginal : null;

      $('cotacaoForm').reset();
      $('successBox').classList.add('hidden');
      $('etapaFormulario').classList.remove('hidden');
      state.arquivos = [];
      renderFiles();

      $('cnpj').value = formatCnpj(cnpj);
      $('empresa').value = empresa;
      $('material').value = '';
      $('quantidade').value = '';
      $('prazo').value = '';
      $('descricao').value = '';
      $('infoAdicional').value = '';

      if (contatoOriginal) {
        $('contato').value = contatoOriginal.contato || '';
        $('email').value = contatoOriginal.email || '';
        $('telefone').value = contatoOriginal.telefone || '';
        $('welcomeBox').classList.remove('hidden');
        $('welcomeBox').innerHTML = `<strong>Bem-vindo, ${escapeHtml(empresa || 'cliente')}.</strong><br>Você já tem dados cadastrados. É só ajustar o que precisar e enviar uma nova cotação.`;
        $('contactBox').classList.remove('hidden');
        $('contactBox').innerHTML = `
          <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;">
            <div>
              <strong>Contato identificado</strong><br>
              ${escapeHtml(contatoOriginal.contato || '')}<br>
              ${escapeHtml(contatoOriginal.email || '')}<br>
              ${escapeHtml(contatoOriginal.telefone || '')}
            </div>
            <div class="actions" style="margin-top:0;">
              <button type="button" class="btn-light" onclick="editarContato()">Editar</button>
              <button type="button" class="btn-danger" onclick="naoSouEsseContato()">Não sou ${escapeHtml((contatoOriginal.contato || '').split(' ')[0] || 'esse contato')}</button>
            </div>
          </div>`;
      } else {
        $('welcomeBox').classList.add('hidden');
        $('contactBox').classList.add('hidden');
        $('contato').value = '';
        $('email').value = '';
        $('telefone').value = '';
      }
    }

    function escapeHtml(text) {
      return String(text || '').replace(/[&<>"]/g, s => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[s]));
    }
  </script>
</body>
</html>
