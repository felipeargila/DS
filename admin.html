<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Chakra Petch',sans-serif}
    body{background:#283944;color:#283944;padding:20px;min-height:100vh}
    .wrap{max-width:1700px;margin:0 auto}
    .panel,.login-box,.modal-box{background:#fff;border-radius:6px;box-shadow:0 20px 40px rgba(0,0,0,.25)}
    .hidden{display:none!important}
    .login-screen{max-width:420px;margin:70px auto}
    .login-box{padding:34px}
    .login-box h1{text-align:center;margin-bottom:8px}
    .subtitle{text-align:center;color:#6c7880;margin-bottom:24px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:14px;font-weight:600;margin-bottom:8px}
    .field input,.field select,.field textarea{width:100%;padding:13px;border:1px solid #d7dde1;border-radius:4px;font-size:15px}
    .field textarea{min-height:100px;resize:vertical}
    button{cursor:pointer;border:0;border-radius:4px;padding:12px 16px;font-weight:700}
    .btn-primary{background:#b9ad95;color:#283944}
    .btn-dark{background:#283944;color:#fff}
    .btn-green{background:#2cad4a;color:#fff}
    .btn-danger{background:#d94a4a;color:#fff}
    .btn-light{background:#eef2f4;color:#283944}
    .header{padding:24px 28px;display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:20px}
    .header-left{display:flex;align-items:center;gap:18px}
    .header-left img{max-width:160px}
    .header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .badge{background:#b9ad95;color:#283944;padding:8px 10px;border-radius:4px;font-weight:700}
    .toolbar,.filters{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:20px}
    .tabs{display:flex;gap:10px;flex-wrap:wrap}
    .tab{background:#eef2f4;color:#283944}
    .tab.active{background:#b9ad95}
    .filters-left{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .content.panel{padding:20px}
    .board{display:grid;gap:18px}
    .board.cotacoes{grid-template-columns:repeat(4,minmax(300px,1fr))}
    .board.visitas{grid-template-columns:repeat(6,minmax(250px,1fr))}
    .board.arquivados{grid-template-columns:repeat(2,minmax(440px,1fr))}
    .column{background:#eef2f4;border-radius:6px;min-height:420px;display:flex;flex-direction:column}
    .col-header{padding:14px 16px;border-bottom:2px solid #d8cfbe;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:15px}
    .count{background:#283944;color:#fff;border-radius:999px;padding:3px 10px;font-size:13px}
    .cards{padding:14px;display:flex;flex-direction:column;gap:12px;min-height:340px}
    .empty{padding:24px;text-align:center;color:#76838d}
    .card{background:#fff;border-radius:6px;padding:14px;border-left:4px solid #b9ad95;box-shadow:0 8px 18px rgba(0,0,0,.08)}
    .card.dragging{opacity:.55}
    .card h4{font-size:22px;margin-bottom:6px}
    .card small{color:#74818b}
    .meta{font-size:14px;line-height:1.45;color:#51606b;margin-top:8px}
    .pill{display:inline-block;background:#eef2f4;border-radius:4px;padding:6px 8px;font-size:12px;font-weight:700;margin-bottom:8px}
    .money-pill{background:#dff2de;color:#2f7d3c;float:right}
    .card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .card-actions button{padding:8px 10px;font-size:12px}
    .list{display:grid;gap:14px}
    .client-card,.report-box,.vendor-box{background:#fff;border-radius:6px;padding:18px;border:1px solid #e5eaed}
    .client-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .client-history{margin-top:16px}
    .history-item{padding:10px 0;border-top:1px solid #eef2f4;font-size:14px}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden}
    th,td{padding:14px 16px;text-align:left;border-bottom:1px solid #eef2f4}
    th{background:#283944;color:#fff}
    .report-grid{display:grid;grid-template-columns:repeat(2,minmax(320px,1fr));gap:18px;margin-bottom:20px}
    .report-box h3{margin-bottom:8px}
    .report-value{font-size:32px;font-weight:700;margin-bottom:6px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:20px;z-index:99}
    .modal-box{width:min(520px,100%);padding:24px}
    .modal-box h3{margin-bottom:14px}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:16px}
    .error,.success{padding:12px 14px;border-radius:4px;margin-bottom:16px}
    .error{background:#ffe8e8;color:#9c2f2f}.success{background:#e7f6e8;color:#266536}
    @media (max-width:1500px){.board.visitas{grid-template-columns:repeat(3,minmax(250px,1fr))}}
    @media (max-width:1200px){.board.cotacoes,.board.visitas,.board.arquivados,.report-grid{grid-template-columns:1fr 1fr}}
    @media (max-width:820px){.board.cotacoes,.board.visitas,.board.arquivados,.report-grid{grid-template-columns:1fr}.header,.toolbar,.filters{padding:16px}.content.panel{padding:14px}}
  </style>
</head>
<body>
<div class="wrap">
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h1>Painel Administrativo</h1>
      <p class="subtitle">Entre com seu usuário e senha.</p>
      <div id="loginMsg"></div>
      <div class="field"><label>Usuário</label><input id="loginUsuario"></div>
      <div class="field"><label>Senha</label><input id="loginSenha" type="password"></div>
      <button class="btn-dark" style="width:100%" onclick="fazerLogin()">Entrar</button>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="header panel">
      <div class="header-left">
        <img src="https://i.imgur.com/4FJQxPk.png" alt="DS MaqCare" onerror="this.style.display='none'">
        <div>
          <h1 style="font-size:28px">Painel Administrativo</h1>
        </div>
      </div>
      <div class="header-right">
        <span id="userName"></span>
        <span id="userType" class="badge"></span>
        <button class="btn-primary" onclick="abrirSenha()">Minha senha</button>
        <button class="btn-light" onclick="logout()">Sair</button>
      </div>
    </div>

    <div class="toolbar panel">
      <div class="tabs">
        <button class="tab active" data-tab="orcamentos" onclick="trocarAba('orcamentos', this)">ORÇAMENTOS</button>
        <button class="tab" data-tab="visitas" onclick="trocarAba('visitas', this)">VISITAS</button>
        <button class="tab" data-tab="arquivados" onclick="trocarAba('arquivados', this)">ARQUIVADOS</button>
        <button class="tab" data-tab="clientes" onclick="trocarAba('clientes', this)">CLIENTES</button>
        <button id="tabRelatorios" class="tab hidden" data-tab="relatorios" onclick="trocarAba('relatorios', this)">RELATÓRIOS</button>
        <button id="tabVendedores" class="tab hidden" data-tab="vendedores" onclick="trocarAba('vendedores', this)">VENDEDORES</button>
      </div>
      <button class="btn-green" onclick="abrirNovo()">+ NOVO</button>
    </div>

    <div class="filters panel">
      <div class="filters-left">
        <span>Filtrar por vendedor:</span>
        <select id="filtroVendedor" onchange="renderAtual()"><option value="todos">Todos os vendedores</option></select>
      </div>
      <div class="filters-left">
        <label style="display:flex;gap:8px;align-items:center"><input type="checkbox" id="autoReload"> Auto-reload</label>
        <span id="atualizadoEm">Última atualização: -</span>
      </div>
    </div>

    <div id="globalMsg"></div>
    <div id="content" class="content panel"></div>
  </div>
</div>

<div id="modal" class="modal hidden"><div id="modalBox" class="modal-box"></div></div>

<script>
const API_URL = '';
const QUOTE_COLUMNS = ['Novo Orçamento', 'Orçamento Enviado', 'Pedido Aprovado', 'Sem Retorno'];
const VISIT_COLUMNS = ['Agendar Mapeamento', 'Visita Técnica', 'PPO', 'Enviado', 'Negócio Gerado', 'Sem Retorno'];
const state = {
  token: localStorage.getItem('token') || '',
  user: null,
  activeTab: 'orcamentos',
  cotacoes: [],
  visitas: [],
  arquivados: [],
  clientes: [],
  vendedores: [],
  dragItem: null,
  autoReloadId: null,
  pendingMove: null
};
const $ = id => document.getElementById(id);

window.addEventListener('load', init);
$('autoReload').addEventListener('change', toggleAutoReload);

async function init() {
  if (!state.token) return mostrarLogin();
  try {
    const data = await api('/api/verificar-token');
    state.user = data.usuario;
    mostrarApp();
    await carregarTudo();
  } catch {
    logout(false);
    mostrarLogin();
  }
}

function mostrarLogin() {
  $('loginScreen').classList.remove('hidden');
  $('app').classList.add('hidden');
}

function mostrarApp() {
  $('loginScreen').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('userName').textContent = state.user.nome;
  $('userType').textContent = state.user.tipo.toUpperCase();
  if (state.user.tipo === 'master') {
    $('tabRelatorios').classList.remove('hidden');
    $('tabVendedores').classList.remove('hidden');
  }
}

async function fazerLogin() {
  try {
    const resposta = await fetch(`${API_URL}/api/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ usuario:$('loginUsuario').value.trim(), senha:$('loginSenha').value })
    });
    const dados = await resposta.json();
    if (!dados.sucesso) throw new Error(dados.erro || 'Falha no login');
    state.token = dados.token;
    state.user = dados.usuario;
    localStorage.setItem('token', state.token);
    mostrarApp();
    await carregarTudo();
  } catch (e) {
    $('loginMsg').innerHTML = `<div class="error">${escapeHtml(e.message)}</div>`;
  }
}

function logout(clear = true) {
  if (clear) localStorage.removeItem('token');
  state.token = '';
  state.user = null;
  clearInterval(state.autoReloadId);
  state.autoReloadId = null;
  mostrarLogin();
}

async function api(path, options = {}) {
  const headers = options.headers || {};
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const resp = await fetch(`${API_URL}${path}`, { ...options, headers });
  const text = await resp.text();
  let data;
  try { data = text ? JSON.parse(text) : {}; } catch { data = { erro: text || 'Resposta inválida' }; }
  if (!resp.ok || data.sucesso === false) throw new Error(data.erro || `Erro em ${path}`);
  return data;
}

async function carregarTudo() {
  try {
    const reqs = [api('/api/cotacoes'), api('/api/visitas'), api('/api/arquivados'), api('/api/clientes')];
    if (state.user.tipo === 'master') reqs.push(api('/api/vendedores'));
    const [cotacoes, visitas, arquivados, clientes, vendedores = []] = await Promise.all(reqs);
    state.cotacoes = cotacoes;
    state.visitas = visitas;
    state.arquivados = arquivados;
    state.clientes = clientes;
    state.vendedores = vendedores;
    popularFiltroVendedores();
    $('atualizadoEm').textContent = `Última atualização: ${new Date().toLocaleTimeString('pt-BR')}`;
    renderAtual();
  } catch (e) {
    $('globalMsg').innerHTML = `<div class="error">${escapeHtml(e.message)}</div>`;
  }
}

function popularFiltroVendedores() {
  const opts = ['<option value="todos">Todos os vendedores</option>']
    .concat(state.vendedores.map(v => `<option value="${v.id}">${escapeHtml(v.nome)}</option>`));
  $('filtroVendedor').innerHTML = opts.join('');
}

function trocarAba(tab, btn) {
  state.activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderAtual();
}

function renderAtual() {
  $('globalMsg').innerHTML = '';
  const view = state.activeTab;
  if (view === 'orcamentos') return renderCotacoes();
  if (view === 'visitas') return renderVisitas();
  if (view === 'arquivados') return renderArquivados();
  if (view === 'clientes') return renderClientes();
  if (view === 'relatorios') return renderRelatorios();
  if (view === 'vendedores') return renderVendedores();
}

function filtroVendedor(items) {
  const filtro = $('filtroVendedor').value;
  if (filtro === 'todos') return items;
  return items.filter(i => i.vendedorId === filtro);
}

function renderCotacoes() {
  const lista = filtroVendedor(state.cotacoes);
  $('content').innerHTML = `<div class="board cotacoes">${QUOTE_COLUMNS.map(col => renderColumn(col, lista.filter(i => i.status === col), 'cotacao')).join('')}</div>`;
  ativarDropzones();
}

function renderVisitas() {
  const lista = filtroVendedor(state.visitas);
  $('content').innerHTML = `<div class="board visitas">${VISIT_COLUMNS.map(col => renderColumn(col, lista.filter(i => i.status === col), 'visita')).join('')}</div>`;
  ativarDropzones();
}

function renderArquivados() {
  const lista = filtroVendedor(state.arquivados);
  const semRetorno = lista.filter(i => i.subtipo === 'sem_retorno');
  const aprovados = lista.filter(i => i.subtipo === 'aprovado' || (i.subtipo || '').includes('aprov'));
  $('content').innerHTML = `<div class="board arquivados">${renderArchiveColumn('Sem Retorno [Arquivados]', semRetorno)}${renderArchiveColumn('Aprovados [Arquivados]', aprovados)}</div>`;
}

function renderClientes() {
  const html = state.clientes.map((cliente, idx) => {
    const selectId = `contatoFiltro${idx}`;
    const resumo = cliente.historico[0] || {};
    return `
      <div class="client-card">
        <div class="client-top">
          <div>
            <h3>${escapeHtml(cliente.empresa || 'Sem empresa')}</h3>
            <div class="meta">CNPJ: ${formatCnpj(cliente.cnpj)}<br>Total aprovado: ${formatMoney(cliente.totalCompras)}</div>
          </div>
          <div class="actions">
            <button class="btn-light" onclick="toggleDetails('det${idx}')">VER +</button>
            ${state.user.tipo === 'master' ? `<button class="btn-danger" onclick="excluirCliente('${cliente.cnpj}')">Excluir Cliente</button>` : ''}
          </div>
        </div>
        <div id="det${idx}" class="hidden client-history">
          <div class="field" style="max-width:320px">
            <label>Filtrar histórico por contato</label>
            <select id="${selectId}" onchange="atualizarResumoCliente(${idx})">
              <option value="todos">Todos os contatos</option>
              ${cliente.contatos.map((c, i) => `<option value="${i}">${escapeHtml(c.contato || c.email || c.telefone || 'Contato')}</option>`).join('')}
            </select>
          </div>
          <div id="resumoCliente${idx}" class="info"></div>
          <div>${cliente.historico.map(h => `
            <div class="history-item">
              <strong>${escapeHtml(h.status || 'Sem status')}</strong> • ${new Date(h.dataCriacao || Date.now()).toLocaleDateString('pt-BR')}<br>
              ${escapeHtml(h.contato || '')} • ${escapeHtml(h.email || '')} • ${escapeHtml(h.telefone || '')}<br>
              ${escapeHtml(h.descricao || '')}<br>
              ${h.valor ? `Valor: ${formatMoney(h.valor)}<br>` : ''}
            </div>
          `).join('')}</div>
        </div>
      </div>`;
  }).join('') || '<div class="empty">Nenhum cliente encontrado.</div>';
  $('content').innerHTML = `<div class="list">${html}</div>`;
}

function toggleDetails(id) {
  const el = $(id);
  el.classList.toggle('hidden');
  if (!el.classList.contains('hidden')) {
    const idx = Number(id.replace('det',''));
    atualizarResumoCliente(idx);
  }
}

function atualizarResumoCliente(idx) {
  const cliente = state.clientes[idx];
  const filtro = $(`contatoFiltro${idx}`).value;
  let bloco = '';
  if (filtro === 'todos') {
    const ult = cliente.historico[0] || {};
    bloco = `<div class="client-card" style="margin-bottom:12px"><strong>Última cotação por:</strong> ${escapeHtml(ult.contato || 'Não identificado')}<br>${escapeHtml(ult.email || '')}<br>${escapeHtml(ult.telefone || '')}</div>`;
  } else {
    const contato = cliente.contatos[Number(filtro)] || {};
    bloco = `<div class="client-card" style="margin-bottom:12px"><strong>Contato principal</strong><br>${escapeHtml(contato.contato || '')}<br>${escapeHtml(contato.email || '')}<br>${escapeHtml(contato.telefone || '')}</div>`;
  }
  $(`resumoCliente${idx}`).innerHTML = bloco;
}

async function renderRelatorios() {
  try {
    const dados = await api('/api/relatorios/geral');
    $('content').innerHTML = `
      <div class="report-grid">
        <div class="report-box"><h3>Vendas da semana</h3><div class="report-value">${formatMoney(dados.geral.vendasSemana)}</div><div>${escapeHtml(dados.geral.periodoSemana)}</div></div>
        <div class="report-box"><h3>Vendas do mês</h3><div class="report-value">${formatMoney(dados.geral.vendasMes)}</div><div>${escapeHtml(dados.geral.periodoMes)}</div></div>
      </div>
      <table>
        <thead><tr><th style="width:28%">Vendedor</th><th style="width:18%">Total</th><th style="width:18%">Convertidos</th><th style="width:18%">Taxa</th><th style="width:18%">Valor vendido</th></tr></thead>
        <tbody>${dados.porVendedor.map(v => `<tr><td>${escapeHtml(v.vendedor)}</td><td>${v.total}</td><td>${v.convertidos}</td><td>${escapeHtml(v.taxa)}</td><td>${formatMoney(v.valorVendido)}</td></tr>`).join('')}</tbody>
      </table>`;
  } catch (e) {
    $('content').innerHTML = `<div class="error">${escapeHtml(e.message)}</div>`;
  }
}

function renderVendedores() {
  const linhas = state.vendedores.map(v => `
    <tr>
      <td>${escapeHtml(v.nome)}</td>
      <td>${escapeHtml(v.login)}</td>
      <td>${escapeHtml(v.codigoAcesso)}</td>
      <td>${escapeHtml(v.tipo)}</td>
      <td>${v.ativo ? 'Ativo' : 'Inativo'}</td>
      <td>
        <div class="card-actions">
          <button class="btn-light" onclick='editarVendedor(${JSON.stringify(v).replace(/'/g, '&apos;')})'>Editar</button>
          <button class="btn-primary" onclick="abrirSenha('${v.id}')">Senha</button>
          ${v.id !== 'MASTER' ? `<button class="btn-danger" onclick="excluirVendedor('${v.id}')">Excluir</button>` : ''}
        </div>
      </td>
    </tr>`).join('');
  $('content').innerHTML = `<table><thead><tr><th>Nome</th><th>Login</th><th>Código</th><th>Tipo</th><th>Status</th><th>Ações</th></tr></thead><tbody>${linhas}</tbody></table>`;
}

function renderColumn(title, items, type) {
  return `<div class="column" data-type="${type}" data-status="${title}">
    <div class="col-header"><span>${escapeHtml(title)}</span><span class="count">${items.length}</span></div>
    <div class="cards">${items.length ? items.map(item => renderCard(item, type)).join('') : '<div class="empty">Sem cards</div>'}</div>
  </div>`;
}

function renderArchiveColumn(title, items) {
  return `<div class="column"><div class="col-header"><span>${escapeHtml(title)}</span><span class="count">${items.length}</span></div><div class="cards">${items.length ? items.map(renderArchivedCard).join('') : '<div class="empty">Nenhum item arquivado</div>'}</div></div>`;
}

function renderCard(item, type) {
  return `<div class="card" draggable="true" ondragstart="dragStart(event, '${type}', '${item.id}')" ondragend="dragEnd(event)">
    ${item.valor ? `<span class="pill money-pill">${formatMoney(item.valor)}</span>` : ''}
    <div class="pill">${escapeHtml(item.id)}</div>
    <h4>${escapeHtml(item.empresa || 'Sem empresa')}</h4>
    <small>${escapeHtml(item.contato || '')}</small>
    <div class="meta">
      ${type === 'cotacao' ? `Descrição: ${escapeHtml(item.descricao || '')}<br>` : ''}
      ${item.telefone ? `Telefone: ${escapeHtml(item.telefone)}<br>` : ''}
      ${item.linkOrcamento ? `Link: <a href="${escapeAttr(item.linkOrcamento)}" target="_blank">Ver</a><br>` : ''}
      Criado em: ${new Date(item.dataCriacao || Date.now()).toLocaleDateString('pt-BR')}
    </div>
    <div class="card-actions">
      ${type === 'cotacao' ? `<button class="btn-light" onclick="abrirVisita('${item.id}')">VISITA</button>` : ''}
      <button class="btn-danger" onclick="arquivarManual('${type}', '${item.id}', '${item.status === 'Pedido Aprovado' ? 'aprovado' : 'sem_retorno'}')">Arquivar</button>
    </div>
  </div>`;
}

function renderArchivedCard(entry) {
  let dados = {};
  try { dados = JSON.parse(entry.dados || '{}'); } catch {}
  return `<div class="card">
    ${dados.valor ? `<span class="pill money-pill">${formatMoney(dados.valor)}</span>` : ''}
    <div class="pill">${escapeHtml(entry.subtipo || 'arquivado')}</div>
    <h4>${escapeHtml(dados.empresa || 'Sem empresa')}</h4>
    <div class="meta">
      Contato: ${escapeHtml(dados.contato || '')}<br>
      ${dados.valor ? `Valor: ${formatMoney(dados.valor)}<br>` : ''}
      ${dados.linkOrcamento ? `Link: <a href="${escapeAttr(dados.linkOrcamento)}" target="_blank">Ver</a><br>` : ''}
      Arquivado em: ${new Date(entry.dataArquivamento || Date.now()).toLocaleDateString('pt-BR')}<br>
      ${entry.motivo ? `Motivo: ${escapeHtml(entry.motivo)}` : ''}
    </div>
    <div class="card-actions">
      <button class="btn-light" onclick="restaurarArquivado('${entry.id}')">Restaurar</button>
      <button class="btn-danger" onclick="excluirArquivado('${entry.id}')">Excluir</button>
    </div>
  </div>`;
}

function ativarDropzones() {
  document.querySelectorAll('.column[data-status]').forEach(col => {
    col.ondragover = e => e.preventDefault();
    col.ondrop = e => dropOnColumn(e, col.dataset.type, col.dataset.status);
  });
}

function dragStart(event, type, id) {
  state.dragItem = { type, id };
  event.currentTarget.classList.add('dragging');
}
function dragEnd(event) { event.currentTarget.classList.remove('dragging'); }

function dropOnColumn(event, type, status) {
  event.preventDefault();
  if (!state.dragItem || state.dragItem.type !== type) return;
  const origemLista = type === 'cotacao' ? state.cotacoes : state.visitas;
  const item = origemLista.find(i => i.id === state.dragItem.id);
  if (!item || item.status === status) return;

  if (type === 'cotacao' && status === 'Orçamento Enviado') {
    state.pendingMove = { type, id: item.id, status };
    return abrirModalStatus('Informe o link do orçamento', `<div class="field"><label>Link do Google Drive *</label><input id="modalLink"></div>`, async () => {
      const link = $('modalLink').value.trim();
      if (!link.includes('drive.google.com')) return alert('Use um link do Google Drive.');
      await atualizarCotacao(item.id, { status, linkOrcamento: link });
    });
  }

  if (type === 'cotacao' && status === 'Pedido Aprovado') {
    return abrirModalStatus('Informe o valor aprovado', `<div class="field"><label>Valor *</label><input id="modalValor" placeholder="R$ 0,00"></div>`, async () => {
      const valor = parseMoney($('modalValor').value);
      if (!valor) return alert('Informe um valor.');
      await atualizarCotacao(item.id, { status, valor, dataAprovacao: new Date().toISOString() });
    }, true);
  }

  if (type === 'cotacao') return atualizarCotacao(item.id, { status });
  return atualizarVisita(item.id, { status });
}

async function atualizarCotacao(id, payload) {
  try {
    const atual = state.cotacoes.find(c => c.id === id);
    await api(`/api/cotacoes/${id}`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ ...atual, ...payload })
    });
    fecharModal();
    await carregarTudo();
  } catch (e) { mostrarErro(e.message); }
}

async function atualizarVisita(id, payload) {
  try {
    const atual = state.visitas.find(v => v.id === id);
    await api(`/api/visitas/${id}`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ ...atual, ...payload })
    });
    await carregarTudo();
  } catch (e) { mostrarErro(e.message); }
}

async function arquivarManual(tipo, id, subtipo) {
  if (!confirm('Arquivar este card?')) return;
  try {
    await api('/api/arquivar', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ tipo, id, subtipo, motivo:'Arquivado manualmente' })
    });
    await carregarTudo();
  } catch (e) { mostrarErro(e.message); }
}

async function restaurarArquivado(id) {
  try {
    await api(`/api/arquivados/${id}/restaurar`, { method:'POST' });
    await carregarTudo();
  } catch (e) { mostrarErro(e.message); }

async function excluirArquivado(id) {
  if (!confirm('Excluir permanentemente este item?')) return;
  try {
    await api(`/api/arquivados/${id}`, { method:'DELETE' });
    await carregarTudo();

function abrirModalStatus(title, body, onSave, money=false) {
  $('modalBox').innerHTML = `<h3>${escapeHtml(title)}</h3>${body}<div class="modal-actions"><button class="btn-light" onclick="fecharModal()">Cancelar</button><button class="btn-dark" id="saveModalBtn">Salvar</button></div>`;
  $('modal').classList.remove('hidden');
  $('saveModalBtn').onclick = onSave;
  if (money) {
    const input = $('modalValor');
    input.addEventListener('input', e => e.target.value = formatMoneyInput(e.target.value));
  }
}

function abrirNovo() {
  const body = `<div class="actions" style="justify-content:flex-start"><button class="btn-light" onclick="abrirNovoVendedor()">Novo Vendedor</button><button class="btn-light" onclick="abrirNovaVisitaLivre()">Nova Visita</button></div><p style="margin-top:12px;color:#6c7880">Para novos orçamentos, use o portal do cliente.</p>`;
  abrirModalStatus('Novo', body, fecharModal);
}

    <h3>Nova Visita</h3>
    <div class="field"><label>Empresa</label><input id="novaVisitaEmpresa"></div>
    <div class="field"><label>Contato</label><input id="novaVisitaContato"></div>
    <div class="field"><label>Telefone</label><input id="novaVisitaTelefone"></div>
    <div class="field"><label>Status</label><select id="novaVisitaStatus">${VISIT_COLUMNS.map(s => `<option>${s}</option>`).join('')}</select></div>
    <div class="modal-actions"><button class="btn-light" onclick="fecharModal()">Cancelar</button><button class="btn-dark" onclick="salvarNovaVisitaLivre()">Salvar</button></div>`;

}

  try {
    await api('/api/visitas', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ empresa:$('novaVisitaEmpresa').value, contato:$('novaVisitaContato').value, telefone:$('novaVisitaTelefone').value, status:$('novaVisitaStatus').value })
    });
    fecharModal();

function abrirVisita(cotacaoId) {
  const cot = state.cotacoes.find(c => c.id === cotacaoId);
  $('modalBox').innerHTML = `
    <h3>Criar visita vinculada</h3>
    <div class="field"><label>Empresa</label><input id="visEmpresa" value="${escapeAttr(cot?.empresa || '')}"></div>
    <div class="field"><label>Contato</label><input id="visContato" value="${escapeAttr(cot?.contato || '')}"></div>
    <div class="field"><label>Telefone</label><input id="visTelefone" value="${escapeAttr(cot?.telefone || '')}"></div>
    <div class="modal-actions"><button class="btn-light" onclick="fecharModal()">Cancelar</button><button class="btn-dark" onclick="salvarVisita('${cotacaoId}')">Salvar</button></div>`;
  $('modal').classList.remove('hidden');
}

async function salvarVisita(cotacaoId) {
  try {
    await api('/api/visitas', {
      method:'POST', headers:{'Content-Type':'application/json'},

function abrirSenha(vendedorId = state.user.id) {
  $('modalBox').innerHTML = `
    <h3>Alterar senha</h3>
    <div class="field"><label>Nova senha</label><input id="novaSenha" type="password"></div>
    <div class="modal-actions"><button class="btn-light" onclick="fecharModal()">Cancelar</button><button class="btn-dark" onclick="salvarSenha('${vendedorId}')">Salvar</button></div>`;
  $('modal').classList.remove('hidden');
}

async function salvarSenha(vendedorId) {
  try {
    await api(`/api/vendedores/${vendedorId}/senha`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ senha:$('novaSenha').value }) });
    fecharModal();
    mostrarSucesso('Senha atualizada.');
  } catch (e) { mostrarErro(e.message); }
}

function abrirNovoVendedor(edit = null) {
  $('modalBox').innerHTML = `
    <h3>${edit ? 'Editar vendedor' : 'Novo vendedor'}</h3>
    <div class="field"><label>Nome</label><input id="vendNome" value="${escapeAttr(edit?.nome || '')}"></div>
    <div class="field"><label>Login</label><input id="vendLogin" value="${escapeAttr(edit?.login || '')}"></div>
    ${edit ? '' : '<div class="field"><label>Senha</label><input id="vendSenha" type="password"></div>'}
    <div class="field"><label>Código de acesso</label><input id="vendCodigo" maxlength="6" value="${escapeAttr(edit?.codigoAcesso || '')}"></div>
    <div class="field"><label>Tipo</label><select id="vendTipo"><option value="vendedor">Vendedor</option><option value="master">Master</option></select></div>
    <div class="field"><label>Status</label><select id="vendAtivo"><option value="1">Ativo</option><option value="0">Inativo</option></select></div>
    <div class="modal-actions"><button class="btn-light" onclick="fecharModal()">Cancelar</button><button class="btn-dark" onclick="salvarVendedor(${edit ? `'${edit.id}'` : 'null'})">Salvar</button></div>`;
  $('modal').classList.remove('hidden');
  if (edit) {
    $('vendTipo').value = edit.tipo;
    $('vendAtivo').value = edit.ativo ? '1' : '0';
  }
}

function editarVendedor(v) { abrirNovoVendedor(v); }

async function salvarVendedor(id) {
  try {
    const payload = {
      nome: $('vendNome').value.trim(),
      login: $('vendLogin').value.trim(),
      codigoAcesso: $('vendCodigo').value.trim().toUpperCase(),
      tipo: $('vendTipo').value,
      ativo: $('vendAtivo').value === '1'
    };
    if (id) {
      await api(`/api/vendedores/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    } else {
      payload.senha = $('vendSenha').value;
      await api('/api/vendedores', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    }
    fecharModal();
    await carregarTudo();
  } catch (e) { mostrarErro(e.message); }
}

async function excluirVendedor(id) {
  if (!confirm('Excluir vendedor?')) return;
  try { await api(`/api/vendedores/${id}`, { method:'DELETE' }); await carregarTudo(); } catch (e) { mostrarErro(e.message); }
}

async function excluirCliente(cnpj) {
  if (!confirm('Excluir cliente e todo o histórico?')) return;
  try { await api(`/api/clientes/${cnpj}`, { method:'DELETE' }); await carregarTudo(); } catch (e) { mostrarErro(e.message); }
}

function fecharModal() { $('modal').classList.add('hidden'); $('modalBox').innerHTML = ''; }
function mostrarErro(msg) { $('globalMsg').innerHTML = `<div class="error">${escapeHtml(msg)}</div>`; }
function mostrarSucesso(msg) { $('globalMsg').innerHTML = `<div class="success">${escapeHtml(msg)}</div>`; }

function toggleAutoReload() {
  if ($('autoReload').checked) {
    state.autoReloadId = setInterval(carregarTudo, 10000);
  } else {
    clearInterval(state.autoReloadId);
    state.autoReloadId = null;
  }
}

function formatMoney(v) { return Number(v || 0).toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
function parseMoney(v) { return Number(String(v).replace(/\./g,'').replace(',','.').replace(/[^0-9.\-]/g,'')) || 0; }
function formatMoneyInput(v) {
  const digits = String(v).replace(/\D/g, '');
  const num = Number(digits || 0) / 100;
  return num.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
}
function formatCnpj(v) { const n = String(v||'').replace(/\D/g,''); return n.replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\/\d{4})(\d)/,'$1-$2'); }
function escapeHtml(text){return String(text||'').replace(/[&<>"']/g, s=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[s]));}
function escapeAttr(text){return escapeHtml(text).replace(/`/g,'&#96;');}
</script>
