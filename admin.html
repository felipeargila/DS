<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Cotações</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Chakra Petch', sans-serif;
        }
        
        body {
            background: #283944;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            border-radius: 4px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo-area img {
            max-height: 40px;
            width: auto;
        }
        
        h1 {
            color: #283944;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .tab-menu {
            display: flex;
            gap: 10px;
            background: #f0f0f0;
            padding: 5px;
            border-radius: 4px;
        }
        
        .tab-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            background: transparent;
            color: #283944;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: #b7ab97;
            color: #283944;
        }
        
        .tab-btn:hover:not(.active) {
            background: #e0e0e0;
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        
        .btn-primary {
            background: #b7ab97;
            color: #283944;
        }
        
        .btn-primary:hover {
            background: #a59984;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #b7ab97;
            color: #b7ab97;
        }
        
        .btn-outline:hover {
            background: #b7ab97;
            color: #283944;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .kanban-section {
            display: none;
        }
        
        .kanban-section.active {
            display: block;
        }
        
        .kanban-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        
        .kanban-column {
            background: #f5f5f5;
            border-radius: 4px;
            min-width: 320px;
            max-width: 320px;
            flex: 1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .column-header {
            padding: 15px;
            background: white;
            color: #283944;
            border-radius: 4px 4px 0 0;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #b7ab97;
            font-size: 16px;
            letter-spacing: 0.3px;
        }
        
        .column-count {
            background: #283944;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .cards-container {
            min-height: 500px;
            padding: 15px;
        }
        
        .card {
            background: white;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border-left: 4px solid;
            position: relative;
        }
        
        .card.arquivado {
            opacity: 0.7;
            background: #f9f9f9;
            border-left-color: #999 !important;
        }
        
        .card.draggable {
            cursor: move;
        }
        
        .card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .drag-handle {
            color: #b7ab97;
            font-size: 18px;
            cursor: move;
            user-select: none;
            padding: 0 5px;
        }
        
        .card-id {
            font-size: 12px;
            color: #999;
            font-weight: 300;
        }
        
        .card-actions-top {
            display: flex;
            gap: 5px;
        }
        
        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        .icon-btn:hover {
            background: #f0f0f0;
        }
        
        .icon-btn.delete:hover {
            color: #dc3545;
        }
        
        .icon-btn.archive:hover {
            color: #ffc107;
        }
        
        .icon-btn.restore:hover {
            color: #28a745;
        }
        
        .card-company {
            font-weight: 600;
            color: #283944;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .card-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 300;
        }
        
        .card-info strong {
            color: #283944;
            font-weight: 600;
        }
        
        .card-files {
            margin: 10px 0;
            font-size: 12px;
            color: #b7ab97;
            font-weight: 500;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 10px;
            flex-wrap: wrap;
        }
        
        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #f0f0f0;
            color: #283944;
            transition: all 0.3s;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            flex: 1;
            min-width: 70px;
        }
        
        .btn-small:hover {
            background: #e0e0e0;
        }
        
        .btn-small.edit {
            background: #283944;
            color: white;
        }
        
        .btn-small.edit:hover {
            background: #1a2a33;
        }
        
        .btn-small.visita {
            background: #b7ab97;
            color: #283944;
        }
        
        .btn-small.visita:hover {
            background: #a59984;
        }
        
        .btn-small.delete {
            background: #dc3545;
            color: white;
        }
        
        .btn-small.delete:hover {
            background: #c82333;
        }
        
        .btn-small.archive {
            background: #ffc107;
            color: #283944;
        }
        
        .btn-small.archive:hover {
            background: #e0a800;
        }
        
        .btn-small.restore {
            background: #28a745;
            color: white;
        }
        
        .btn-small.restore:hover {
            background: #218838;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(40, 57, 68, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 4px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .modal-content.small {
            max-width: 400px;
            text-align: center;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #b7ab97;
        }
        
        .modal-header h2 {
            color: #283944;
            font-size: 22px;
            font-weight: 600;
        }
        
        .close {
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }
        
        .close:hover {
            color: #283944;
        }
        
        .modal-body {
            margin-bottom: 20px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .info-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 4px;
            border-left: 3px solid #b7ab97;
        }
        
        .info-item.full-width {
            grid-column: span 2;
        }
        
        .info-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 15px;
            color: #283944;
            font-weight: 500;
            word-break: break-word;
        }
        
        .info-value input,
        .info-value select,
        .info-value textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
        }
        
        .info-value input:focus,
        .info-value select:focus,
        .info-value textarea:focus {
            border-color: #b7ab97;
            outline: none;
        }
        
        .files-list {
            margin-top: 15px;
        }
        
        .file-item {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 4px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-name {
            color: #283944;
            font-weight: 500;
        }
        
        .file-size {
            color: #999;
            font-size: 12px;
        }
        
        .status-selector {
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 4px;
        }
        
        .status-selector label {
            display: block;
            margin-bottom: 8px;
            color: #283944;
            font-weight: 500;
        }
        
        .status-selector select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
        }
        
        .status-selector select:focus {
            border-color: #b7ab97;
            outline: none;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-weight: 300;
            font-size: 14px;
        }
        
        .badge {
            background: #b7ab97;
            color: #283944;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }
        
        .days-badge {
            background: #dc3545;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 5px;
        }
        
        .option-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
        }
        
        .option-btn {
            padding: 20px 40px;
            font-size: 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .option-btn.orcamento {
            background: #283944;
            color: white;
        }
        
        .option-btn.orcamento:hover {
            background: #1a2a33;
            transform: scale(1.05);
        }
        
        .option-btn.visita {
            background: #b7ab97;
            color: #283944;
        }
        
        .option-btn.visita:hover {
            background: #a59984;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <img src="https://maqcare.dsindustria.com.br/wp-content/uploads/2026/03/LOGO.png" alt="Logo Maqcare">
                <h1>PAINEL ADMINISTRATIVO</h1>
            </div>
            
            <div class="tab-menu">
                <button class="tab-btn active" onclick="mudarAba('orcamentos')">ORÇAMENTOS</button>
                <button class="tab-btn" onclick="mudarAba('visitas')">VISITAS</button>
                <button class="tab-btn" onclick="mudarAba('arquivados')">ARQUIVADOS</button>
            </div>
            
            <div class="header-actions">
                <button class="btn btn-success" onclick="abrirMenuNovo()">+ NOVO</button>
                <button class="btn btn-outline" onclick="exportarDados()">EXPORTAR</button>
                <button class="btn btn-primary" onclick="recarregarCards()">ATUALIZAR</button>
            </div>
        </header>
        
        <!-- Seção Orçamentos -->
        <div id="sectionOrcamentos" class="kanban-section active">
            <div class="kanban-container" id="kanbanCotacoes"></div>
        </div>
        
        <!-- Seção Visitas -->
        <div id="sectionVisitas" class="kanban-section">
            <div class="kanban-container" id="kanbanVisitas"></div>
        </div>
        
        <!-- Seção Arquivados -->
        <div id="sectionArquivados" class="kanban-section">
            <div class="kanban-container" style="justify-content: center;">
                <div class="kanban-column" style="max-width: 600px; min-width: 600px;">
                    <div class="column-header">
                        <span>📦 ARQUIVADOS</span>
                        <span class="column-count" id="arquivadosCount">0</span>
                    </div>
                    <div class="cards-container" id="arquivadosContainer">
                        <!-- Cards arquivados serão inseridos aqui -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal de Seleção (Novo) -->
    <div class="modal" id="modalSelecaoNovo">
        <div class="modal-content small">
            <div class="modal-header">
                <h2>CRIAR NOVO</h2>
                <span class="close" onclick="fecharModalSelecao()">&times;</span>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 20px;">O que deseja criar?</p>
                <div class="option-buttons">
                    <button class="option-btn orcamento" onclick="abrirModalNovoOrcamento()">ORÇAMENTO</button>
                    <button class="option-btn visita" onclick="abrirModalNovaVisita()">VISITA</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal de Visualização/Edição -->
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Detalhes</h2>
                <span class="close" onclick="fecharModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>
    
    <!-- Modal de Confirmação -->
    <div class="modal" id="confirmModal">
        <div class="confirm-modal">
            <h3 id="confirmTitle">Confirmar</h3>
            <p id="confirmMessage"></p>
            <div class="confirm-actions">
                <button class="btn-small" onclick="fecharConfirmModal()">CANCELAR</button>
                <button class="btn-small delete" id="confirmBtn">CONFIRMAR</button>
            </div>
        </div>
    </div>
    
    <script>
        // Colunas do Kanban de Cotações
        const colunasCotacoes = [
            'Novo Orçamento',
            'Orçamento Enviado',
            'Pedido Aprovado',
            'Sem Retorno'
        ];
        
        // Colunas do Kanban de Visitas
        const colunasVisitas = [
            'Agendar Mapeamento',
            'Visita Técnica',
            'PPO',
            'Enviado',
            'Negócio Gerado',
            'Sem Retorno'
        ];
        
        let cotacoes = [];
        let visitas = [];
        let arquivados = [];
        let draggedItem = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            carregarDados();
            processarArquivamentoAutomatico();
            renderizarKanbans();
            initDragAndDrop();
        });
        
        function carregarDados() {
            cotacoes = JSON.parse(localStorage.getItem('cotacoes') || '[]');
            visitas = JSON.parse(localStorage.getItem('visitas') || '[]');
            arquivados = JSON.parse(localStorage.getItem('arquivados') || '[]');
        }
        
        function salvarDados() {
            localStorage.setItem('cotacoes', JSON.stringify(cotacoes));
            localStorage.setItem('visitas', JSON.stringify(visitas));
            localStorage.setItem('arquivados', JSON.stringify(arquivados));
        }
        
        function processarArquivamentoAutomatico() {
            const hoje = new Date();
            let arquivadosHoje = [];
            
            // Processar cotações em "Sem Retorno"
            cotacoes = cotacoes.filter(cot => {
                if (cot.status === 'Sem Retorno') {
                    const dias = calcularDias(cot.dataCriacao);
                    if (dias >= 30) {
                        arquivadosHoje.push({
                            ...cot,
                            tipo: 'cotacao',
                            dataArquivamento: new Date().toISOString().split('T')[0],
                            motivo: '30+ dias em Sem Retorno'
                        });
                        return false;
                    }
                }
                return true;
            });
            
            // Processar visitas em "Sem Retorno"
            visitas = visitas.filter(vis => {
                if (vis.status === 'Sem Retorno') {
                    const dias = calcularDias(vis.dataCriacao || vis.dataVisita);
                    if (dias >= 30) {
                        arquivadosHoje.push({
                            ...vis,
                            tipo: 'visita',
                            dataArquivamento: new Date().toISOString().split('T')[0],
                            motivo: '30+ dias em Sem Retorno'
                        });
                        return false;
                    }
                }
                return true;
            });
            
            if (arquivadosHoje.length > 0) {
                arquivados = [...arquivados, ...arquivadosHoje];
                salvarDados();
            }
        }
        
        function calcularDias(dataString) {
            if (!dataString) return 0;
            const data = new Date(dataString);
            const hoje = new Date();
            const diffTime = Math.abs(hoje - data);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }
        
        function renderizarKanbans() {
            renderizarKanbanCotacoes();
            renderizarKanbanVisitas();
            renderizarArquivados();
        }
        
        function renderizarKanbanCotacoes() {
            const container = document.getElementById('kanbanCotacoes');
            container.innerHTML = '';
            
            colunasCotacoes.forEach(coluna => {
                const cardsColuna = cotacoes.filter(c => c.status === coluna);
                
                const columnEl = document.createElement('div');
                columnEl.className = 'kanban-column';
                columnEl.innerHTML = `
                    <div class="column-header">
                        <span>${coluna}</span>
                        <span class="column-count">${cardsColuna.length}</span>
                    </div>
                    <div class="cards-container" data-coluna="${coluna}" data-tipo="cotacao">
                        ${cardsColuna.length ? cardsColuna.map(card => criarCardCotacao(card)).join('') : 
                            '<div class="empty-state">Nenhum orçamento</div>'}
                    </div>
                `;
                
                container.appendChild(columnEl);
            });
        }
        
        function renderizarKanbanVisitas() {
            const container = document.getElementById('kanbanVisitas');
            container.innerHTML = '';
            
            colunasVisitas.forEach(coluna => {
                const cardsColuna = visitas.filter(v => v.status === coluna);
                
                const columnEl = document.createElement('div');
                columnEl.className = 'kanban-column';
                columnEl.innerHTML = `
                    <div class="column-header">
                        <span>${coluna}</span>
                        <span class="column-count">${cardsColuna.length}</span>
                    </div>
                    <div class="cards-container" data-coluna="${coluna}" data-tipo="visita">
                        ${cardsColuna.length ? cardsColuna.map(card => criarCardVisita(card)).join('') : 
                            '<div class="empty-state">Nenhuma visita</div>'}
                    </div>
                `;
                
                container.appendChild(columnEl);
            });
        }
        
        function renderizarArquivados() {
            const container = document.getElementById('arquivadosContainer');
            const countSpan = document.getElementById('arquivadosCount');
            
            countSpan.textContent = arquivados.length;
            
            if (arquivados.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhum item arquivado</div>';
                return;
            }
            
            container.innerHTML = arquivados.map(item => {
                if (item.tipo === 'cotacao') {
                    return criarCardArquivadoCotacao(item);
                } else {
                    return criarCardArquivadoVisita(item);
                }
            }).join('');
        }
        
        function criarCardCotacao(card) {
            let borderColor = '#b7ab97';
            if (card.status === 'Pedido Aprovado') borderColor = '#283944';
            if (card.status === 'Sem Retorno') borderColor = '#dc3545';
            
            const diasSemRetorno = card.status === 'Sem Retorno' ? calcularDias(card.dataCriacao) : 0;
            
            return `
                <div class="card draggable" draggable="true" data-id="${card.id}" data-tipo="cotacao" data-status="${card.status}" style="border-left-color: ${borderColor}">
                    <div class="card-header">
                        <span class="drag-handle">⋮⋮</span>
                        <span class="card-id">${card.id}</span>
                        <div class="card-actions-top">

        function initDragAndDrop() {
            const cards = document.querySelectorAll('.card.draggable');
            const containers = document.querySelectorAll('.cards-container');
            
            cards.forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);
            });
            
            containers.forEach(container => {
                container.addEventListener('dragover', handleDragOver);
                container.addEventListener('drop', handleDrop);
            });
        }
        
        function handleDragStart(e) {
            draggedItem = this;
            this.classList.add('dragging');
            e.dataTransfer.setData('text/plain', this.dataset.id);
            e.dataTransfer.effectAllowed = 'move';
        }
        
        function handleDragEnd(e) {
            this.classList.remove('dragging');
            draggedItem = null;
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }
        
        function handleDrop(e) {
            e.preventDefault();
            
            if (!draggedItem) return;
            
            const container = e.target.closest('.cards-container');
            if (!container) return;
            
            const novaColuna = container.dataset.coluna;
            const tipo = container.dataset.tipo;
            const cardId = draggedItem.dataset.id;
            const cardTipo = draggedItem.dataset.tipo;
            
            if (cardTipo !== tipo) {
                alert('Não é possível mover entre seções diferentes');
                return;
            }
            
            if (tipo === 'cotacao') {
                const index = cotacoes.findIndex(c => c.id === cardId);
                if (index !== -1) {
                    cotacoes[index].status = novaColuna;
                    salvarDados();
                }
            } else {
                const index = visitas.findIndex(v => v.id === cardId);
                if (index !== -1) {
                    visitas[index].status = novaColuna;
                    salvarDados();
                }
            }
            
            processarArquivamentoAutomatico();
            renderizarKanbans();
            initDragAndDrop();
        }
