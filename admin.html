<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Cotações</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Chakra Petch', sans-serif;
        }
        
        body {
            background: #283944;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            border-radius: 4px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo-area img {
            max-height: 40px;
            width: auto;
        }
        
        h1 {
            color: #283944;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        
        .btn-primary {
            background: #b7ab97;
            color: #283944;
        }
        
        .btn-primary:hover {
            background: #a59984;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #b7ab97;
            color: #b7ab97;
        }
        
        .btn-outline:hover {
            background: #b7ab97;
            color: #283944;
        }
        
        .section-title {
            margin: 40px 0 20px;
            color: white;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 2px solid #b7ab97;
            padding-bottom: 10px;
        }
        
        .kanban-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        
        .kanban-column {
            background: #f5f5f5;
            border-radius: 4px;
            min-width: 320px;
            max-width: 320px;
            flex: 1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .column-header {
            padding: 15px;
            background: white;
            color: #283944;
            border-radius: 4px 4px 0 0;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #b7ab97;
            font-size: 16px;
            letter-spacing: 0.3px;
        }
        
        .column-count {
            background: #283944;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .cards-container {
            min-height: 500px;
            padding: 15px;
        }
        
        .card {
            background: white;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: move;
            transition: all 0.3s;
            border-left: 4px solid;
            position: relative;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .card-id {
            font-size: 12px;
            color: #999;
            font-weight: 300;
        }
        
        .card-company {
            font-weight: 600;
            color: #283944;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .card-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 300;
        }
        
        .card-info strong {
            color: #283944;
            font-weight: 600;
        }
        
        .card-files {
            margin: 10px 0;
            font-size: 12px;
            color: #b7ab97;
            font-weight: 500;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 10px;
            flex-wrap: wrap;
        }
        
        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #f0f0f0;
            color: #283944;
            transition: all 0.3s;
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            flex: 1;
            min-width: 70px;
        }
        
        .btn-small:hover {
            background: #e0e0e0;
        }
        
        .btn-small.edit {
            background: #283944;
            color: white;
        }
        
        .btn-small.edit:hover {
            background: #1a2a33;
        }
        
        .btn-small.visita {
            background: #b7ab97;
            color: #283944;
        }
        
        .btn-small.visita:hover {
            background: #a59984;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(40, 57, 68, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 4px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #283944;
            font-size: 22px;
            font-weight: 600;
        }
        
        .close {
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }
        
        .close:hover {
            color: #283944;
        }
        
        .formatting-toolbar {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px 4px 0 0;
            display: flex;
            gap: 10px;
            border: 1px solid #ddd;
            border-bottom: none;
        }
        
        .format-btn {
            padding: 5px 12px;
            border: none;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            color: #283944;
            border: 1px solid #ddd;
            font-family: 'Chakra Petch', sans-serif;
        }
        
        .format-btn:hover {
            background: #b7ab97;
            color: white;
            border-color: #b7ab97;
        }
        
        .rich-textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 0 0 4px 4px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 14px;
            resize: vertical;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 25px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #283944;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            font-family: 'Chakra Petch', sans-serif;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #b7ab97;
            outline: none;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-weight: 300;
            font-size: 14px;
        }
        
        .badge {
            background: #b7ab97;
            color: #283944;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <img src="https://maqcare.dsindustria.com.br/wp-content/uploads/2026/03/LOGO.png" alt="Logo Maqcare">
                <h1>PAINEL ADMINISTRATIVO</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="exportarDados()">EXPORTAR</button>
                <button class="btn btn-primary" onclick="recarregarCards()">ATUALIZAR</button>
            </div>
        </header>
        
        <div class="section-title">📋 COTAÇÕES</div>
        <div class="kanban-container" id="kanbanCotacoes"></div>
        
        <div class="section-title" style="margin-top: 40px;">🔧 VISITAS TÉCNICAS</div>
        <div class="kanban-container" id="kanbanVisitas"></div>
    </div>
    
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Editar</h2>
                <span class="close" onclick="fecharModal()">&times;</span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script>
        const colunasCotacoes = ['Novo Orçamento', 'Orçamento Enviado', 'Pedido Aprovado', 'Pedido Recusado'];
        const colunasVisitas = ['Agendar Mapeamento', 'Visita Técnica', 'PPO', 'Enviado', 'Negócio Gerado'];
        
        let cotacoes = [];
        let visitas = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            carregarDados();
            renderizarKanbans();
        });
        
        function carregarDados() {
            cotacoes = JSON.parse(localStorage.getItem('cotacoes') || '[]');
            visitas = JSON.parse(localStorage.getItem('visitas') || '[]');
        }
        
        function renderizarKanbans() {
            renderizarKanbanCotacoes();
            renderizarKanbanVisitas();
            adicionarDragDrop();
        }
        
        function renderizarKanbanCotacoes() {
            const container = document.getElementById('kanbanCotacoes');
            container.innerHTML = '';
            
            colunasCotacoes.forEach(coluna => {
                const cardsColuna = cotacoes.filter(c => c.status === coluna);
                
                container.innerHTML += `
                    <div class="kanban-column">
                        <div class="column-header">
                            <span>${coluna}</span>
                            <span class="column-count">${cardsColuna.length}</span>
                        </div>
                        <div class="cards-container" data-coluna="${coluna}" data-tipo="cotacao">
                            ${cardsColuna.length ? cardsColuna.map(card => `
                                <div class="card" draggable="true" data-id="${card.id}" data-tipo="cotacao" style="border-left-color: #b7ab97">
                                    <div class="card-header">
                                        <span class="card-id">${card.id}</span>
                                        <span class="badge">${card.dataCriacao}</span>
                                    </div>
                                    <div class="card-company">${card.empresa}</div>
                                    <div class="card-info">
                                        <strong>Contato:</strong> ${card.contato}<br>
                                        <strong>Material:</strong> ${card.material || '---'}
                                    </div>
                                    ${card.arquivos && card.arquivos.length ? `<div class="card-files">📎 ${card.arquivos.length} arquivo(s)</div>` : ''}
                                    <div class="card-actions">
                                        <button class="btn-small edit" onclick="editarCard('${card.id}', 'cotacao')">EDITAR</button>
                                        <button class="btn-small visita" onclick="criarVisita('${card.id}')">VISITA</button>
                                    </div>
                                </div>
                            `).join('') : '<div class="empty-state">Nenhum orçamento</div>'}
                        </div>
                    </div>
                `;
            });
        }
        
        function renderizarKanbanVisitas() {
            const container = document.getElementById('kanbanVisitas');
            container.innerHTML = '';
            
            colunasVisitas.forEach(coluna => {
                const cardsColuna = visitas.filter(v => v.status === coluna);
                
                container.innerHTML += `
                    <div class="kanban-column">
                        <div class="column-header">
                            <span>${coluna}</span>
                            <span class="column-count">${cardsColuna.length}</span>
                        </div>
                        <div class="cards-container" data-coluna="${coluna}" data-tipo="visita">
                            ${cardsColuna.length ? cardsColuna.map(card => `
                                <div class="card" draggable="true" data-id="${card.id}" data-tipo="visita" style="border-left-color: #b7ab97">
                                    <div class="card-header">
                                        <span class="card-id">${card.id}</span>
                                    </div>
                                    <div class="card-company">${card.empresa}</div>
                                    <div class="card-info">
                                        <strong>Data:</strong> ${card.dataVisita || '---'}<br>
                                        <strong>Técnico:</strong> ${card.tecnico || '---'}
                                    </div>
                                    <div class="card-actions">
                                        <button class="btn-small edit" onclick="editarCard('${card.id}', 'visita')">EDITAR</button>
                                        <button class="btn-small" onclick="editarRelato('${card.id}')">RELATO</button>
                                        <button class="btn-small" onclick="editarPPO('${card.id}')">PPO</button>
                                    </div>
                                </div>
                            `).join('') : '<div class="empty-state">Nenhuma visita</div>'}
                        </div>
                    </div>
                `;
            });
        }
        
        function adicionarDragDrop() {
            // Função simplificada - apenas para não quebrar
        }
        
        function editarCard(id, tipo) {
            alert('Função de edição será implementada em breve');
        }
        
        function criarVisita(id) {
            const cotacao = cotacoes.find(c => c.id === id);
            if (!cotacao) return;
            
            const novaVisita = {
                id: 'VIS' + Date.now(),
                cotacaoId: id,
                empresa: cotacao.empresa,
                contato: cotacao.contato,
                status: 'Agendar Mapeamento',
                dataVisita: '',
                tecnico: '',
                relatoVisita: '',
                ppo: ''
            };
            
            visitas.push(novaVisita);
            localStorage.setItem('visitas', JSON.stringify(visitas));
            renderizarKanbans();
        }
        
        function editarRelato(id) {
            alert('Função de relato será implementada em breve');
        }
        
        function editarPPO(id) {
            alert('Função de PPO será implementada em breve');
        }
        
        function fecharModal() {
            document.getElementById('editModal').classList.remove('active');
        }
        
        function exportarDados() {
            const dados = { cotacoes, visitas };
            const blob = new Blob([JSON.stringify(dados)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup.json';
            a.click();
        }
        
        function recarregarCards() {
            carregarDados();
            renderizarKanbans();
        }
    </script>
</body>
</html>
